persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log

listener 1883
# Anonymous access is disabled: the access/door topic drives a physical lock,
# so every client must authenticate. Credentials are provisioned into
# /mosquitto/config/passwd at container start (see docker-compose.yml).
allow_anonymous false
password_file /mosquitto/config/passwd
